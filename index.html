<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד הריון - אורטל וסטלר שטרול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
        :root { --primary: #2d5a27; --secondary: #94b49f; --accent: #ebf2fa; }
        body { font-family: 'Assistant', sans-serif; background-color: transparent; color: #333; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 3px solid var(--primary); color: var(--primary); font-weight: 800; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="glass-card p-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-right">
                <h1 class="text-3xl font-800 text-[#2d5a27] mb-1">אורטל וסטלר שטרול</h1>
                <p class="text-gray-500 font-light" id="current-status-label">טוען נתונים חיים...</p>
            </div>
            
            <div class="relative w-32 h-32 flex items-center justify-center">
                <svg class="w-full h-full">
                    <circle class="text-gray-100" stroke-width="8" stroke="currentColor" fill="transparent" r="58" cx="64" cy="64"/>
                    <circle id="progress-circle" class="text-[#2d5a27] progress-ring" stroke-width="8" stroke-dasharray="364.4" stroke-dashoffset="364.4" stroke-linecap="round" stroke="currentColor" fill="transparent" r="58" cx="64" cy="64"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="pct-display" class="text-2xl font-800 text-[#2d5a27]">0%</span>
                    <span class="text-[10px] uppercase tracking-wider text-gray-400">הושלם</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="glass-card p-4 text-center">
                <div id="week-val" class="text-2xl font-800 text-[#2d5a27]">—</div>
                <div class="text-xs text-gray-400">שבוע הריון</div>
            </div>
            <div class="glass-card p-4 text-center">
                <div id="days-left-val" class="text-2xl font-800 text-[#2d5a27]">—</div>
                <div class="text-xs text-gray-400">ימים ללידה</div>
            </div>
            <div class="glass-card p-4 text-center">
                <div id="trimester-val" class="text-2xl font-800 text-[#2d5a27]">—</div>
                <div class="text-xs text-gray-400">טרימסטר</div>
            </div>
            <div class="glass-card p-4 text-center">
                <div id="due-date-val" class="text-lg font-700 text-[#2d5a27]">נובמבר 2026</div>
                <div class="text-xs text-gray-400">תל"מ משוער</div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="flex border-b border-gray-100">
                <button onclick="switchTab('milestones')" id="btn-milestones" class="flex-1 py-4 text-sm tab-active">ציר זמן ובדיקות</button>
                <button onclick="switchTab('insights')" id="btn-insights" class="flex-1 py-4 text-sm text-gray-400">תובנות AI</button>
            </div>
            
            <div id="content-milestones" class="p-6 space-y-4 max-h-[500px] overflow-y-auto pr-2">
                <div class="text-center py-10 text-gray-300">מתחבר ל-Google Sheets...</div>
            </div>

            <div id="content-insights" class="p-6 hidden">
                <div class="bg-green-50 border border-green-100 rounded-2xl p-6 relative overflow-hidden">
                    <div class="relative z-10">
                        <h3 class="font-800 text-[#2d5a27] mb-3"><i class="fa-solid fa-wand-sparkles ml-2"></i>תובנות אישיות לשבוע הנוכחי</h3>
                        <p id="ai-insight-text" class="text-sm leading-relaxed text-[#2d5a27]/80">ה-AI מנתח את הנתונים שלך...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '150RrMsZTZ_3YRwMr8kJMWPdYcMbWwi2XCNFbhj8-nTU';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                const lmpDate = new Date(rows[0].c[4].v);
                processPregnancy(lmpDate);
                renderMilestones(rows);
            } catch (e) {
                console.error("Connection error", e);
            }
        }

        function processPregnancy(lmp) {
            const now = new Date();
            const diffDays = Math.floor((now - lmp) / (1000 * 60 * 60 * 24));
            const weeks = Math.floor(diffDays / 7);
            const days = diffDays % 7;
            const pct = Math.floor((diffDays / 280) * 100);

            document.getElementById('week-val').innerText = `${weeks}+${days}`;
            document.getElementById('days-left-val').innerText = 280 - diffDays;
            document.getElementById('pct-display').innerText = pct + "%";
            document.getElementById('trimester-val').innerText = weeks < 13 ? "ראשון" : (weeks < 27 ? "שני" : "שלישי");
            
            const circle = document.getElementById('progress-circle');
            const offset = 364.4 - (pct / 100 * 364.4);
            circle.style.strokeDashoffset = offset;

            document.getElementById('current-status-label').innerText = `היום ה-14 במאי 2026 | שבוע ${weeks}+${days} מוצלח!`;
