<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב הריון — אורטל וסטלר שטרול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #4ade80;
            --sage-deep: #16a34a;
            --teal: #2dd4bf;
            --bg: #f8fffe;
            --card: #ffffff;
            --text: #0f2417;
            --muted: #6b7280;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Hero */
        .hero {
            background: linear-gradient(145deg, #065f46 0%, #0f766e 60%, #0d9488 100%);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 280px; height: 280px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -40px;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }

        /* Photo area */
        .photo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
            cursor: pointer;
        }
        .photo-ring {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            overflow: hidden;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s;
        }
        .photo-wrapper:hover .photo-ring { border-color: rgba(255,255,255,0.9); }
        .photo-placeholder-inner {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px; width: 100%; height: 100%;
        }
        .photo-placeholder-inner span.emoji { font-size: 36px; line-height: 1; }
        .photo-placeholder-inner span.label {
            font-size: 9px; font-weight: 700;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .photo-edit-badge {
            position: absolute;
            bottom: 2px; left: 2px;
            background: white;
            color: #059669;
            border-radius: 50%;
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.8);
        }

        /* Stat chips */
        .stat-chip {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(6,95,70,0.06), 0 1px 3px rgba(0,0,0,0.04);
            border: 1px solid #e6f4ee;
        }

        /* Tabs */
        .tab-btn {
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 18px;
            border: 1.5px solid #d1fae5;
            background: white;
            color: #059669;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .tab-btn:hover { background: #f0fdf4; }
        .tab-active {
            background: #065f46 !important;
            color: white !important;
            border-color: #065f46 !important;
        }

        /* Check items */
        .check-item {
            border-radius: 16px;
            border: 1.5px solid #e6f4ee;
            background: #fafffe;
            padding: 16px;
            transition: border-color 0.2s;
        }
        .check-item:hover { border-color: #a7f3d0; }
        .check-item.done { background: #f0fdf4; }

        .check-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid #d1fae5;
            background: white;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }
        .check-circle.done {
            background: linear-gradient(135deg, #065f46, #0d9488);
            border-color: transparent;
            color: white;
        }

        /* Progress bar */
        .progress-track {
            background: #e6f4ee;
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #065f46, #0d9488, #2dd4bf);
            height: 100%;
            border-radius: 99px;
            transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
        }

        /* Date input */
        .date-input {
            border: 1.5px solid #d1fae5;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            background: white;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .date-input:focus { border-color: #059669; }

        /* Badge */
        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 99px;
            background: #d1fae5;
            color: #065f46;
            letter-spacing: 0.02em;
        }

        /* Section label */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
        }

        /* Add form */
        .add-form {
            background: #f0fdf4;
            border: 2px dashed #86efac;
            border-radius: 16px;
            padding: 16px;
        }
        .add-form input {
            width: 100%;
            border: 1.5px solid #d1fae5;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none;
            background: white;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        .add-form input:focus { border-color: #059669; }

        /* Appt card */
        .appt-card {
            background: linear-gradient(135deg, #f0fdfa, #f0fdf4);
            border: 1.5px solid #ccfbf1;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            transition: opacity 0.3s ease;
            background: #065f46;
            color: white;
            padding: 10px 24px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(6,95,70,0.3);
            white-space: nowrap;
        }

        /* Photo */
        #profile-img { object-fit: cover; width: 100%; height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Btn */
        .btn-primary {
            background: linear-gradient(135deg, #065f46, #0d9488);
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }

        .btn-ghost {
            background: white;
            border: 1.5px solid #d1fae5;
            color: #059669;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-ghost:hover { background: #f0fdf4; }
    </style>
</head>
<body class="pb-28">

<div id="toast" class="toast opacity-0 pointer-events-none">נשמר בהצלחה ✓</div>

<!-- Hero -->
<div class="hero text-white pt-12 pb-20 px-6 rounded-b-[36px] shadow-xl">
    <div class="relative z-10 max-w-lg mx-auto">

        <!-- Profile -->
        <div class="text-center mb-8">
            <div class="photo-wrapper" onclick="document.getElementById('photoInput').click()">
                <div class="photo-ring" id="photo-ring">
                    <div class="photo-placeholder-inner" id="photo-placeholder-wrap">
                        <span class="emoji">🤰</span>
                        <span class="label">הוסיפי תמונה</span>
                    </div>
                    <img id="profile-img" class="hidden w-full h-full object-cover" alt="פרופיל">
                </div>
                <div class="photo-edit-badge">📷</div>
            </div>
            <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="handlePhoto(event)">
            <p class="text-white/50 text-[10px] font-semibold uppercase tracking-widest mb-2">My Personal Dashboard</p>
            <h1 class="text-2xl font-extrabold tracking-tight mb-1">Pregnancy Tracking Dashboard</h1>
            <p class="text-white/50 text-[11px] font-medium">Ortal Vestler Shtrul</p>
        </div>

        <!-- Stats row -->
        <div class="grid grid-cols-3 gap-3">
            <div class="stat-chip">
                <div class="text-2xl font-black tracking-tight" id="stat-week">—</div>
                <div class="text-[10px] font-semibold text-white/60 mt-0.5">שבוע</div>
            </div>
            <div class="stat-chip">
                <div class="text-2xl font-black tracking-tight" id="stat-days">—</div>
                <div class="text-[10px] font-semibold text-white/60 mt-0.5">ימים ללידה</div>
            </div>
            <div class="stat-chip">
                <div class="text-2xl font-black tracking-tight text-emerald-300" id="stat-pct">0%</div>
                <div class="text-[10px] font-semibold text-white/60 mt-0.5">הושלם</div>
            </div>
        </div>
    </div>
</div>

<!-- Content -->
<div class="px-5 -mt-10 relative z-10 max-w-lg mx-auto space-y-4">

    <!-- Progress Card -->
    <div class="card p-5">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <span class="text-lg">🌱</span>
                <span class="font-bold text-sm text-gray-800">התקדמות ההיריון</span>
            </div>
            <span id="stat-pct-badge" class="badge">0%</span>
        </div>
        <div class="progress-track mb-3">
            <div id="progress-bar" class="progress-fill" style="width:0%"></div>
        </div>
        <div id="due-date-text" class="text-center text-xs font-semibold text-emerald-700 bg-emerald-50 py-2.5 rounded-xl border border-emerald-100"></div>
    </div>

    <!-- Checks Card -->
    <div class="card p-5">
        <div class="flex items-center gap-2 mb-5">
            <span class="text-lg">✅</span>
            <span class="font-bold text-sm text-gray-800">בדיקות מעקב</span>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-5 overflow-x-auto pb-1 no-scrollbar">
            <button onclick="changeTab(0)" id="tab-0" class="tab-btn tab-active">שליש א׳</button>
            <button onclick="changeTab(1)" id="tab-1" class="tab-btn">שליש ב׳</button>
            <button onclick="changeTab(2)" id="tab-2" class="tab-btn">שליש ג׳</button>
        </div>

        <div id="checks-container" class="space-y-3"></div>

        <!-- Add form -->
        <div id="add-check-form" class="add-form hidden mt-4">
            <p class="text-xs font-bold text-emerald-700 mb-3">הוספת בדיקה לשליש זה</p>
            <input id="new-check-name" type="text" placeholder="שם הבדיקה *">
            <input id="new-check-range" type="text" placeholder="טווח שבועות (לדוגמה: שבועות 12-14)">
            <input id="new-check-deadline" type="text" placeholder="דדליין (לדוגמה: עד 01/06/2026)" style="margin-bottom:12px">
            <div class="flex gap-2">
                <button onclick="saveNewCheck()" class="btn-primary flex-1">שמירה</button>
                <button onclick="toggleAddForm()" class="btn-ghost flex-1">ביטול</button>
            </div>
        </div>

        <button onclick="toggleAddForm()"
                class="w-full mt-4 py-2.5 text-xs font-bold text-emerald-600 border-2 border-dashed border-emerald-200 rounded-2xl hover:bg-emerald-50 transition-colors">
            + הוספת בדיקה
        </button>
    </div>

    <!-- Appointments Card -->
    <div class="card p-5">
        <div class="flex items-center gap-2 mb-4">
            <span class="text-lg">🗓️</span>
            <span class="font-bold text-sm text-gray-800">התורים שלי</span>
        </div>
        <div id="summary-container" class="space-y-2.5"></div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 pb-4">
        <button onclick="exportData()"
                class="flex-1 flex items-center justify-center gap-2 bg-white border-2 border-emerald-100 text-emerald-700 py-3 rounded-2xl text-xs font-bold hover:bg-emerald-50 transition-colors shadow-sm">
            💾 גיבוי
        </button>
        <button onclick="document.getElementById('importFile').click()"
                class="flex-1 flex items-center justify-center gap-2 bg-white border-2 border-blue-100 text-blue-600 py-3 rounded-2xl text-xs font-bold hover:bg-blue-50 transition-colors shadow-sm">
            📂 טעינת גיבוי
        </button>
        <input type="file" id="importFile" class="hidden" onchange="importData(event)">
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZwI5fvPxj6DUq86J6rlDWiTSA0LBP38g",
        authDomain: "ortal-pregnancy.firebaseapp.com",
        databaseURL: "https://ortal-pregnancy-default-rtdb.firebaseio.com",
        projectId: "ortal-pregnancy",
        storageBucket: "ortal-pregnancy.firebasestorage.app",
        messagingSenderId: "708827194379",
        appId: "1:708827194379:web:a119448562f0ee8437d30e",
        measurementId: "G-Z3HQ2X7VRX"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const LMP = new Date(2026, 1, 18);

    const checksData = [
        [
            {id:'t1_1', name:'בדיקת רופא ראשונה',    range:'עד שבוע 12',       deadline:'עד 19/05/2026'},
            {id:'t1_2', name:'בדיקות דם',             range:'עד שבוע 12',       deadline:'עד 19/05/2026'},
            {id:'t1_3', name:'בדיקות שתן',            range:'עד שבוע 12',       deadline:'עד 19/05/2026'},
            {id:'t1_4', name:'אולטרה סאונד ראשון',   range:'שבועות 7–8',       deadline:'08/04–21/04/2026'},
            {id:'t1_5', name:'סקר נגטיות',            range:'שבועות 0–13',      deadline:'18/02–26/05/2026'},
            {id:'t1_6', name:'שקיפות ערפית',          range:'שבועות 11–13',     deadline:'06/05–26/05/2026'},
            {id:'t1_7', name:'סקר ביוכימי ראשון',     range:'שבועות 11–13',     deadline:'06/05–26/05/2026'},
            {id:'t1_8', name:'סיסי שליה',             range:'שבועות 11–13',     deadline:'06/05–26/05/2026'}
        ],
        [
            {id:'t2_1', name:'סקירה מוקדמת',          range:'שבועות 14–16',     deadline:'27/05–16/06/2026'},
            {id:'t2_2', name:'סקר ביוכימי שני',       range:'שבועות 16–19',     deadline:'10/06–07/07/2026'},
            {id:'t2_3', name:'דיקור מי שפיר',         range:'שבועות 16–20',     deadline:'10/06–14/07/2026'},
            {id:'t2_4', name:'סקירה מאוחרת',          range:'שבועות 21–24',     deadline:'15/07–11/08/2026'},
            {id:'t2_5', name:'אקו לב עוברי',          range:'שבועות 19–25',     deadline:'01/07–18/08/2026'},
            {id:'t2_6', name:'העמסת סוכר',            range:'שבועות 24–28',     deadline:'05/08–08/09/2026'}
        ],
        [
            {id:'t3_1', name:'חיסון נגד שעלת',        range:'שבועות 27–36',     deadline:'26/08–03/11/2026'},
            {id:'t3_2', name:'אולטרה סאונד',          range:'שבועות 30–33',     deadline:'16/09–13/10/2026'},
            {id:'t3_3', name:'תרבית GBS',             range:'החל משבוע 35',     deadline:'לאחר 21/10/2026'},
            {id:'t3_4', name:'הריון עודף',            range:'החל משבוע 40',     deadline:'מ-25/11/2026'}
        ]
    ];

    let state = { checks: {}, dates: {}, photo: null, customChecks: {0:[],1:[],2:[]} };
    let activeTab = 0;

    function save() {
        db.ref('ortal/state').set(state);
        showToast();
    }

    function load() {
        db.ref('ortal/state').on('value', snapshot => {
            const data = snapshot.val();
            if (data) {
                state = data;
                state.checks = state.checks || {};
                state.dates  = state.dates  || {};
                state.customChecks = state.customChecks || {0:[],1:[],2:[]};
                [0,1,2].forEach(i => state.customChecks[i] = state.customChecks[i] || []);
                if (state.photo) {
                    document.getElementById('profile-img').src = state.photo;
                    document.getElementById('profile-img').classList.remove('hidden');
                    document.getElementById('photo-placeholder-wrap').classList.add('hidden');
                }
            }
            updateStats();
            changeTab(activeTab);
            renderSummary();
        });
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.remove('opacity-0','pointer-events-none');
        setTimeout(() => t.classList.add('opacity-0','pointer-events-none'), 2000);
    }

    function updateStats() {
        const diffDays = Math.floor((new Date() - LMP) / 86400000);
        const weeks = Math.floor(diffDays / 7);
        const days  = diffDays % 7;
        const total = 280;
        const left  = Math.max(0, total - diffDays);
        const pct   = Math.min(100, Math.floor((diffDays / total) * 100));

        document.getElementById('stat-week').innerText = `${weeks}+${days}`;
        document.getElementById('stat-days').innerText  = left;
        document.getElementById('stat-pct').innerText   = pct + '%';
        document.getElementById('stat-pct-badge').innerText = pct + '%';
        document.getElementById('progress-bar').style.width  = pct + '%';

        const due = new Date(LMP.getTime() + total * 86400000);
        document.getElementById('due-date-text').innerText =
            `תאריך לידה משוער: ${due.toLocaleDateString('he-IL')}`;
    }

    function changeTab(index) {
        activeTab = index;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('tab-active', i === index);
        });
        document.getElementById('add-check-form').classList.add('hidden');
        renderChecks();
    }

    function toggleCheck(id) {
        state.checks[id] = state.checks[id] === 'done' ? 'none' : 'done';
        save(); renderChecks();
    }

    function updateDate(id, val) {
        state.dates[id] = val;
        save(); renderSummary(); renderChecks();
    }

    function toggleAddForm() {
        const form = document.getElementById('add-check-form');
        form.classList.toggle('hidden');
        if (!form.classList.contains('hidden')) {
            ['new-check-name','new-check-range','new-check-deadline']
                .forEach(id => document.getElementById(id).value = '');
            document.getElementById('new-check-name').focus();
        }
    }

    function saveNewCheck() {
        const name = document.getElementById('new-check-name').value.trim();
        if (!name) { document.getElementById('new-check-name').focus(); return; }
        const range    = document.getElementById('new-check-range').value.trim();
        const deadline = document.getElementById('new-check-deadline').value.trim();
        const id = 'custom_' + Date.now();
        state.customChecks[activeTab].push({ id, name, range, deadline });
        save(); toggleAddForm(); renderChecks();
    }

    function deleteCustomCheck(id) {
        state.customChecks[activeTab] = state.customChecks[activeTab].filter(c => c.id !== id);
        save(); renderChecks();
    }

    function renderCheckItem(c, isCustom) {
        const done = state.checks[c.id] === 'done';
        const dateVal = state.dates[c.id] || '';
        const meta = [c.range, c.deadline].filter(Boolean).join(' · ');

        return `
        <div class="check-item ${done ? 'done' : ''}">
            <div class="flex items-start gap-3 mb-3">
                <button onclick="toggleCheck('${c.id}')" class="check-circle ${done ? 'done' : ''} mt-0.5">
                    ${done ? '✓' : ''}
                </button>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between gap-2">
                        <p class="font-semibold text-sm ${done ? 'line-through text-gray-400' : 'text-gray-800'} truncate">${c.name}</p>
                        ${isCustom ? `<button onclick="deleteCustomCheck('${c.id}')" class="text-[10px] text-red-400 hover:text-red-600 flex-shrink-0 px-2 py-0.5 rounded-full border border-red-100 hover:border-red-300 transition-colors">✕</button>` : ''}
                    </div>
                    ${meta ? `<p class="text-[11px] text-emerald-600 font-medium mt-0.5">${meta}</p>` : ''}
                </div>
            </div>
            <div class="flex gap-2 items-center pr-10">
                <input type="date" onchange="updateDate('${c.id}', this.value)" value="${dateVal}" class="date-input">
                ${dateVal ? `<button onclick="addToCalendar('${c.name}','${dateVal}')" class="bg-blue-50 text-blue-500 p-2 rounded-xl text-base hover:bg-blue-100 transition-colors flex-shrink-0" title="הוספה ליומן">📅</button>` : ''}
            </div>
        </div>`;
    }

    function parseDeadlineDate(deadline) {
        if (!deadline) return null;
        // extract first dd/mm/yyyy occurrence
        const match = deadline.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (!match) return null;
        return new Date(`${match[3]}-${match[2]}-${match[1]}`);
    }

    function renderChecks() {
        const container = document.getElementById('checks-container');
        const builtIn = checksData[activeTab].map(c => ({ ...c, isCustom: false }));
        const custom  = (state.customChecks[activeTab] || []).map(c => ({ ...c, isCustom: true }));

        const all = [...builtIn, ...custom].sort((a, b) => {
            const da = parseDeadlineDate(a.deadline);
            const db = parseDeadlineDate(b.deadline);
            if (!da && !db) return 0;
            if (!da) return 1;
            if (!db) return -1;
            return da - db;
        });

        container.innerHTML = all.map(c => renderCheckItem(c, c.isCustom)).join('');
    }

    function renderSummary() {
        const container = document.getElementById('summary-container');
        const appts = [];

        checksData.forEach(tab => tab.forEach(t => {
            if (state.dates[t.id]) appts.push({ name: t.name, date: state.dates[t.id] });
        }));
        Object.values(state.customChecks || {}).forEach(tab =>
            (tab || []).forEach(t => {
                if (state.dates[t.id]) appts.push({ name: t.name, date: state.dates[t.id] });
            })
        );

        if (!appts.length) {
            container.innerHTML = `<p class="text-xs text-gray-400 text-center py-6">לא הוזנו תורים עדיין</p>`;
            return;
        }

        appts.sort((a, b) => new Date(a.date) - new Date(b.date));
        container.innerHTML = appts.map(a => `
            <div class="appt-card">
                <div>
                    <p class="font-bold text-xs text-gray-800">${a.name}</p>
                    <p class="text-[11px] text-emerald-600 mt-0.5">${new Date(a.date).toLocaleDateString('he-IL')}</p>
                </div>
                <button onclick="addToCalendar('${a.name}','${a.date}')" class="text-xl hover:scale-110 transition-transform">📅</button>
            </div>`).join('');
    }

    function addToCalendar(name, date) {
        const d = date.replace(/-/g,'');
        window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('בדיקת הריון: '+name)}&dates=${d}/${d}&details=מעקב הריון אורטל&sf=true&output=xml`,'_blank');
    }

    function handlePhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            state.photo = e.target.result;
            document.getElementById('profile-img').src = state.photo;
            document.getElementById('profile-img').classList.remove('hidden');
            document.getElementById('photo-placeholder-wrap').classList.add('hidden');
            save();
        };
        reader.readAsDataURL(file);
    }

    function exportData() {
        const a = Object.assign(document.createElement('a'), {
            href: "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)),
            download: "ortal_pregnancy_backup.json"
        });
        document.body.appendChild(a); a.click(); a.remove();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                state = JSON.parse(e.target.result);
                db.ref('ortal/state').set(state);
                location.reload();
            } catch { alert("קובץ הגיבוי לא תקין."); }
        };
        reader.readAsText(file);
    }

    window.onload = () => { load(); setInterval(updateStats, 60000); };
</script>
</body>
</html>
