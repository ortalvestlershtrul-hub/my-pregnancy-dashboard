<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>דשבורד הריון חי — אורטל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #fdf2f8; color: #831843; margin: 0; padding: 20px; }
        .hero-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto space-y-6">
        <div class="hero-grad text-white p-8 rounded-[40px] text-center shadow-lg relative overflow-hidden">
            <h1 class="text-2xl font-black mb-1">אורטל וסטלר שטרול</h1>
            <p id="today-date" class="text-white/70 text-xs mb-6"></p>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white/20 backdrop-blur-sm p-3 rounded-2xl border border-white/20 text-center">
                    <div id="display-week" class="text-2xl font-black">—</div>
                    <div class="text-[9px] font-bold uppercase">שבוע</div>
                </div>
                <div class="bg-white/20 backdrop-blur-sm p-3 rounded-2xl border border-white/20 text-center">
                    <div id="display-days" class="text-2xl font-black">—</div>
                    <div class="text-[9px] font-bold uppercase">ימים ללידה</div>
                </div>
                <div class="bg-white/20 backdrop-blur-sm p-3 rounded-2xl border border-white/20 text-center">
                    <div id="display-pct" class="text-2xl font-black">—</div>
                    <div class="text-[9px] font-bold uppercase">הושלם</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-gray-400">התקדמות ההריון</span>
                <span id="pct-label" class="text-xs font-black text-pink-600">0%</span>
            </div>
            <div class="w-full bg-pink-50 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full hero-grad transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="card">
            <h3 class="font-bold text-sm mb-4 flex items-center gap-2">
                <span>🗓️</span> ציר זמן ובדיקות
            </h3>
            <div id="milestones-list" class="space-y-3 max-h-[400px] overflow-y-auto scrollbar-hide pr-1">
                <div class="text-center text-xs text-gray-400">טוען נתונים מהטבלה...</div>
            </div>
        </div>

        <p class="text-[10px] text-center text-gray-300">הנתונים מסונכרנים בזמן אמת מ-Google Sheets</p>
    </div>

    <script>
        const SHEET_ID = '150RrMsZTZ_3YRwMr8kJMWPdYcMbWwi2XCNFbhj8-nTU';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        document.getElementById('today-date').innerText = new Date().toLocaleDateString('he-IL', {day: 'numeric', month: 'long', year: 'numeric'});

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                const lmpStr = rows[0].c[4].v; 
                const lmpDate = new Date(lmpStr);
                
                updateStats(lmpDate);
                renderAllItems(rows);

            } catch (e) { console.error(e); }
        }

        function updateStats(lmp) {
            const today = new Date();
            const diffDays = Math.floor((today - lmp) / (1000 * 60 * 60 * 24));
            
            document.getElementById('display-week').innerText = `${Math.floor(diffDays / 7)}+${diffDays % 7}`;
            document.getElementById('display-days').innerText = Math.max(0, 280 - diffDays);
            
            const pct = Math.floor((diffDays / 280) * 100);
            document.getElementById('display-pct').innerText = pct + "%";
            document.getElementById('pct-label').innerText = pct + "%";
            document.getElementById('progress-bar').style.width = pct + "%";
        }

        function renderAllItems(rows) {
            const list = document.getElementById('milestones-list');
            let html = '';
            
            // עובר על כל השורות בטבלה החל משורה 2 (Index 1)
            rows.slice(1).forEach(row => {
                if (!row.c[2]) return;
                const name = row.c[2].v;
                const status = row.c[3] ? row.c[3].v : 'Pending';
                
                const isActive = status.toLowerCase() === 'active';
                const bgClass = isActive ? 'bg-pink-50 border-pink-100' : 'bg-gray-50 border-gray-100';
                const textColor = isActive ? 'text-pink-700 font-bold' : 'text-gray-500';
                const icon = isActive ? '✅' : '⏳';

                html += `
                    <div class="flex justify-between items-center p-3 rounded-xl border ${bgClass} transition-all">
                        <span class="text-[11px] ${textColor}">${name}</span>
                        <span class="text-[10px]">${icon}</span>
                    </div>`;
            });
            list.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
